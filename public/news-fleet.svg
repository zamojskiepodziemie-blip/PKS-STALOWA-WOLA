<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.5" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="ceiling" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="aisle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dc2626" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#7f1d1d" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="seat-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="seat-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#64748b"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
    <radialGradient id="light" cx="0.5" cy="0" r="0.7">
      <stop offset="0" stop-color="#fef3c7" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#fef3c7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vanishing" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Ceiling perspective -->
  <polygon points="0,0 800,0 600,160 200,160" fill="url(#ceiling)"/>
  <line x1="200" y1="160" x2="600" y2="160" stroke="#475569" stroke-width="1.5"/>

  <!-- Floor with red runner -->
  <polygon points="0,500 800,500 600,260 200,260" fill="url(#floor)"/>
  <polygon points="340,500 460,500 430,260 370,260" fill="url(#aisle)"/>

  <!-- Side walls -->
  <polygon points="0,0 200,160 200,260 0,500" fill="#0f172a" opacity="0.6"/>
  <polygon points="800,0 600,160 600,260 800,500" fill="#0f172a" opacity="0.6"/>

  <!-- Windows on left wall (perspective rows) -->
  <g>
    <polygon points="20,80 175,140 175,200 20,220" fill="url(#window)" opacity="0.95"/>
    <polygon points="20,80 175,140 175,200 20,220" fill="none" stroke="#0f172a" stroke-width="3"/>
    <line x1="65" y1="100" x2="175" y2="170" stroke="#0f172a" stroke-width="2" opacity="0.5"/>
    <line x1="115" y1="120" x2="175" y2="190" stroke="#0f172a" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Windows on right wall -->
  <g>
    <polygon points="780,80 625,140 625,200 780,220" fill="url(#window)" opacity="0.95"/>
    <polygon points="780,80 625,140 625,200 780,220" fill="none" stroke="#0f172a" stroke-width="3"/>
    <line x1="735" y1="100" x2="625" y2="170" stroke="#0f172a" stroke-width="2" opacity="0.5"/>
    <line x1="685" y1="120" x2="625" y2="190" stroke="#0f172a" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Ceiling LED light strips -->
  <rect x="280" y="80" width="240" height="6" rx="3" fill="#fef3c7" opacity="0.85"/>
  <ellipse cx="400" cy="86" rx="180" ry="40" fill="url(#light)"/>

  <!-- Seat rows (perspective: bigger up front, smaller back) -->
  <!-- Row 6 (farthest, smallest) -->
  <g opacity="0.7">
    <rect x="335" y="200" width="55" height="38" rx="4" fill="url(#seat-top)"/>
    <rect x="410" y="200" width="55" height="38" rx="4" fill="url(#seat-top)"/>
  </g>

  <!-- Row 5 -->
  <g opacity="0.8">
    <rect x="318" y="220" width="68" height="48" rx="5" fill="url(#seat-top)"/>
    <rect x="414" y="220" width="68" height="48" rx="5" fill="url(#seat-top)"/>
    <rect x="318" y="262" width="68" height="14" rx="3" fill="url(#seat-front)"/>
    <rect x="414" y="262" width="68" height="14" rx="3" fill="url(#seat-front)"/>
  </g>

  <!-- Row 4 -->
  <g opacity="0.85">
    <rect x="295" y="245" width="85" height="60" rx="6" fill="url(#seat-top)"/>
    <rect x="420" y="245" width="85" height="60" rx="6" fill="url(#seat-top)"/>
    <rect x="295" y="295" width="85" height="20" rx="4" fill="url(#seat-front)"/>
    <rect x="420" y="295" width="85" height="20" rx="4" fill="url(#seat-front)"/>
    <!-- Headrest top accent -->
    <rect x="305" y="248" width="65" height="6" rx="3" fill="#dc2626"/>
    <rect x="430" y="248" width="65" height="6" rx="3" fill="#dc2626"/>
  </g>

  <!-- Row 3 -->
  <g opacity="0.92">
    <rect x="265" y="280" width="105" height="75" rx="7" fill="url(#seat-top)"/>
    <rect x="430" y="280" width="105" height="75" rx="7" fill="url(#seat-top)"/>
    <rect x="265" y="345" width="105" height="26" rx="5" fill="url(#seat-front)"/>
    <rect x="430" y="345" width="105" height="26" rx="5" fill="url(#seat-front)"/>
    <rect x="278" y="284" width="80" height="7" rx="3" fill="#dc2626"/>
    <rect x="443" y="284" width="80" height="7" rx="3" fill="#dc2626"/>
  </g>

  <!-- Row 2 -->
  <g>
    <rect x="225" y="320" width="135" height="95" rx="8" fill="url(#seat-top)"/>
    <rect x="440" y="320" width="135" height="95" rx="8" fill="url(#seat-top)"/>
    <rect x="225" y="405" width="135" height="32" rx="5" fill="url(#seat-front)"/>
    <rect x="440" y="405" width="135" height="32" rx="5" fill="url(#seat-front)"/>
    <rect x="240" y="325" width="105" height="9" rx="4" fill="#dc2626"/>
    <rect x="455" y="325" width="105" height="9" rx="4" fill="#dc2626"/>
  </g>

  <!-- Row 1 (closest, largest) -->
  <g>
    <rect x="170" y="370" width="170" height="130" rx="10" fill="url(#seat-top)"/>
    <rect x="460" y="370" width="170" height="130" rx="10" fill="url(#seat-top)"/>
    <rect x="190" y="378" width="135" height="12" rx="5" fill="#dc2626"/>
    <rect x="475" y="378" width="135" height="12" rx="5" fill="#dc2626"/>
    <!-- Headrest stitching -->
    <line x1="255" y1="395" x2="255" y2="490" stroke="#0f172a" stroke-width="1.5" opacity="0.4"/>
    <line x1="545" y1="395" x2="545" y2="490" stroke="#0f172a" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Vanishing point glow -->
  <circle cx="400" cy="220" r="60" fill="url(#vanishing)"/>

  <!-- Subtle reflection on aisle -->
  <line x1="370" y1="280" x2="430" y2="280" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="365" y1="320" x2="435" y2="320" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Tiny PKS hint on seat headrest -->
  <text x="255" y="387" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="10" fill="#fff" opacity="0.85">PKS</text>
  <text x="545" y="387" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="10" fill="#fff" opacity="0.85">PKS</text>
</svg>
